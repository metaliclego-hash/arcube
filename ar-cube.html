<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Cube 500mm</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Start Screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(160deg, #0d1117 0%, #161b22 100%);
      color: #e6edf3;
      z-index: 1000;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px rgba(0,122,255,0.5));
    }
    #start-screen h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    #start-screen .subtitle {
      font-size: 0.9rem;
      color: #8b949e;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 1.8rem;
    }

    /* ── Compat panel ── */
    #compat-panel {
      width: 100%;
      max-width: 360px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
    }
    .compat-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0;
      font-size: 0.85rem;
      border-bottom: 1px solid #21262d;
    }
    .compat-row:last-child { border-bottom: none; }
    .compat-icon { font-size: 1rem; width: 22px; text-align: center; flex-shrink: 0; }
    .compat-label { color: #8b949e; }
    .compat-label b { color: #e6edf3; }
    .ok   .compat-icon::after { content: '✅'; }
    .warn .compat-icon::after { content: '⚠️'; }
    .err  .compat-icon::after { content: '❌'; }
    .pend .compat-icon::after { content: '⏳'; }

    #start-btn {
      width: 100%;
      max-width: 360px;
      background: #238636;
      color: #fff;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #start-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #start-btn:not(:disabled):active { background: #196127; transform: scale(0.98); }

    #error-msg {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #f85149;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }
    #help-msg {
      margin-top: 0.8rem;
      font-size: 0.78rem;
      color: #8b949e;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }

    /* ── AR Overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      display: none;
    }

    /* Top bar */
    #top-bar {
      position: absolute;
      top: env(safe-area-inset-top, 20px);
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      pointer-events: auto;
    }
    .badge {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #exit-btn {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* Bottom panel */
    #bottom-panel {
      position: absolute;
      bottom: env(safe-area-inset-bottom, 30px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
      width: 90%;
      max-width: 400px;
    }
    #status-toast {
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      padding: 10px 20px;
      border-radius: 22px;
      font-size: 0.88rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.10);
      width: 100%;
    }
    #btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .ar-btn {
      background: rgba(0,0,0,0.60);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 9px 20px;
      border-radius: 22px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .ar-btn:active { background: rgba(255,255,255,0.18); }
    .ar-btn.hidden { display: none; }

    /* Canvas sits below overlay */
    canvas { position: fixed; inset: 0; z-index: 100; }
  </style>
</head>
<body>

<!-- ─────────────────────────── Start Screen ─────────────────────────── -->
<div id="start-screen">
  <div class="logo">📦</div>
  <h1>AR Cube</h1>
  <p class="subtitle">
    500mm の立方体を床に配置します。<br>
    iPad を床に向け、カメラを動かして<br>平面を検出してください。
  </p>

  <div id="compat-panel">
    <div class="compat-row pend" id="row-https">
      <span class="compat-icon"></span>
      <span class="compat-label">HTTPS 接続</span>
    </div>
    <div class="compat-row pend" id="row-webxr">
      <span class="compat-icon"></span>
      <span class="compat-label">WebXR API</span>
    </div>
    <div class="compat-row pend" id="row-ar">
      <span class="compat-icon"></span>
      <span class="compat-label">immersive-ar モード</span>
    </div>
    <div class="compat-row pend" id="row-hittest">
      <span class="compat-icon"></span>
      <span class="compat-label">ヒットテスト（平面検出）</span>
    </div>
  </div>

  <button id="start-btn" disabled>確認中...</button>
  <div id="error-msg"></div>
  <div id="help-msg"></div>
</div>

<!-- ─────────────────────────── AR Overlay ─────────────────────────── -->
<div id="overlay">
  <div id="top-bar">
    <span class="badge" id="cube-badge">📦 500mm</span>
    <button id="exit-btn" onclick="endAR()">✕ 終了</button>
  </div>
  <div id="bottom-panel">
    <div id="status-toast">床を検出中… カメラを床に向けてください</div>
    <div id="btn-row">
      <button class="ar-btn hidden" id="rotate-left-btn"  onclick="rotateCube(-1)">← 回転</button>
      <button class="ar-btn hidden" id="rotate-right-btn" onclick="rotateCube( 1)">回転 →</button>
      <button class="ar-btn hidden" id="reset-btn"        onclick="resetCube()">リセット</button>
    </div>
  </div>
</div>

<!-- Three.js r160 — stable, well-tested WebXR support -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════
//  Compatibility Check (runs immediately on load)
// ══════════════════════════════════════════════════════════════════════
function setRow(id, state, label) {
  const row = document.getElementById(id);
  row.className = 'compat-row ' + state;          // ok / warn / err / pend
  if (label) row.querySelector('.compat-label').textContent = label;
}

async function runCompatChecks() {
  const startBtn = document.getElementById('start-btn');
  const errorMsg = document.getElementById('error-msg');
  const helpMsg  = document.getElementById('help-msg');
  let ok = true;

  // 1. HTTPS
  const secure = location.protocol === 'https:' ||
                 location.hostname === 'localhost' ||
                 location.hostname === '127.0.0.1';
  setRow('row-https', secure ? 'ok' : 'err',
    secure ? 'HTTPS 接続: OK' : 'HTTPS が必要です（現在 HTTP）');
  if (!secure) {
    ok = false;
    errorMsg.textContent = 'WebXR は HTTPS 接続が必須です。HTTPS 経由でアクセスしてください。';
  }

  // 2. WebXR API
  if (!navigator.xr) {
    setRow('row-webxr', 'err', 'WebXR API: 非対応');
    setRow('row-ar',     'err', 'immersive-ar: 確認不可');
    setRow('row-hittest','err', 'ヒットテスト: 確認不可');
    ok = false;
    errorMsg.textContent = 'このブラウザは WebXR をサポートしていません。\nSafari 最新版（設定 › Safari › 詳細 › 試験的機能 › WebXR を有効）をお試しください。';
    helpMsg.textContent  = 'iPadOS 15 以降の Safari が必要です。';
  } else {
    setRow('row-webxr', 'ok', 'WebXR API: 利用可能');

    // 3. immersive-ar
    let arOk = false;
    try { arOk = await navigator.xr.isSessionSupported('immersive-ar'); } catch(_) {}
    setRow('row-ar', arOk ? 'ok' : 'err',
      arOk ? 'immersive-ar: サポート済み' : 'immersive-ar: 非対応（設定で有効化が必要かも）');
    if (!arOk) {
      ok = false;
      errorMsg.textContent = 'このデバイスは AR モードをサポートしていません。';
      helpMsg.textContent  = 'Safari › 設定 › 詳細 › 試験的機能 › WebXR Device API / WebXR AR Module を ON にしてください。';
    }

    // 4. hit-test (inferred — actual check requires an active session)
    setRow('row-hittest', arOk ? 'ok' : 'warn',
      arOk ? 'ヒットテスト: 利用可能（推定）' : 'ヒットテスト: 確認できません');
  }

  if (ok) {
    startBtn.disabled = false;
    startBtn.textContent = '▶ AR を開始';
  } else {
    startBtn.disabled = true;
    startBtn.textContent = 'このブラウザでは利用不可';
  }
}
runCompatChecks();

// ══════════════════════════════════════════════════════════════════════
//  AR Application State
// ══════════════════════════════════════════════════════════════════════
let renderer, scene, camera;
let reticle;
let cubeGroup;
let hitTestSource = null;
let hitTestRequested = false;
let cubeVisible = false;
let cubeYRotation = 0;

// Long-press drag state
let selectHeld = false;
let dragTimer  = null;
let isDragging = false;
const DRAG_MS  = 450;

function setStatus(msg) {
  document.getElementById('status-toast').textContent = msg;
}
function showCubeButtons(show) {
  ['rotate-left-btn','rotate-right-btn','reset-btn'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', !show);
  });
}

// ══════════════════════════════════════════════════════════════════════
//  Start AR
// ══════════════════════════════════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', startAR);

async function startAR() {
  // ── Three.js Setup ──────────────────────────────────────────────
  scene  = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 30);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.xr.setReferenceSpaceType('local-floor');
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  // ── Lighting ─────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffffff, 1.2));

  const sun = new THREE.DirectionalLight(0xfff5e0, 2.0);
  sun.position.set(2, 5, 3);
  scene.add(sun);

  scene.add(new THREE.HemisphereLight(0xb0d8ff, 0x4a3728, 0.6));

  // ── Reticle (surface indicator ring) ─────────────────────────────
  const ringGeo = new THREE.RingGeometry(0.10, 0.16, 36);
  ringGeo.rotateX(-Math.PI / 2);
  reticle = new THREE.Mesh(
    ringGeo,
    new THREE.MeshBasicMaterial({ color: 0x00e676, side: THREE.DoubleSide })
  );
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  // ── Cube (500 mm = 0.5 m) ─────────────────────────────────────────
  cubeGroup = new THREE.Group();
  cubeGroup.visible = false;
  scene.add(cubeGroup);

  const SIZE = 0.5;
  const cubeGeo = new THREE.BoxGeometry(SIZE, SIZE, SIZE);

  // Faces: semi-transparent blue
  const faceMat = new THREE.MeshStandardMaterial({
    color: 0x1565C0,
    roughness: 0.35,
    metalness: 0.25,
    transparent: true,
    opacity: 0.88,
  });
  const cubeMesh = new THREE.Mesh(cubeGeo, faceMat);
  cubeGroup.add(cubeMesh);

  // Edges: white outline
  const edgeGeo = new THREE.EdgesGeometry(cubeGeo);
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff });
  cubeGroup.add(new THREE.LineSegments(edgeGeo, edgeMat));

  // Thin shadow disc on ground
  const discGeo = new THREE.CircleGeometry(0.3, 32);
  discGeo.rotateX(-Math.PI / 2);
  const discMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    transparent: true,
    opacity: 0.18,
  });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.y = -0.249;        // just below cube bottom
  cubeGroup.add(disc);

  // ── XR Session ───────────────────────────────────────────────────
  const overlay = document.getElementById('overlay');
  let session;

  // Try with dom-overlay first (keeps HTML interactive in AR)
  try {
    session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay', 'light-estimation'],
      domOverlay: { root: overlay },
    });
  } catch (_) {
    // Fallback: without dom-overlay (buttons may not respond on some builds)
    try {
      session = await navigator.xr.requestSession('immersive-ar', {
        requiredFeatures: ['hit-test'],
      });
    } catch (err) {
      document.getElementById('error-msg').textContent =
        'AR セッション開始エラー: ' + err.message;
      renderer.domElement.remove();
      renderer.dispose();
      return;
    }
  }

  await renderer.xr.setSession(session);

  // ── Controller (tap / long-press) ────────────────────────────────
  const controller = renderer.xr.getController(0);
  scene.add(controller);

  controller.addEventListener('selectstart', () => {
    selectHeld = true;
    isDragging = false;
    dragTimer = setTimeout(() => {
      if (selectHeld && cubeVisible) {
        isDragging = true;
        setStatus('ドラッグ中… 指を離すと確定');
      }
    }, DRAG_MS);
  });

  controller.addEventListener('selectend', () => {
    selectHeld = false;
    clearTimeout(dragTimer);
    if (isDragging) {
      isDragging = false;
      setStatus('タップで移動 ｜ 長押しでドラッグ');
    }
  });

  controller.addEventListener('select', () => {
    // Fires after selectend — only act if we were NOT dragging
    if (!isDragging && reticle.visible) {
      placeCube();
    }
  });

  // ── Session end ───────────────────────────────────────────────────
  session.addEventListener('end', onSessionEnd);

  // ── Show UI ──────────────────────────────────────────────────────
  document.getElementById('start-screen').style.display = 'none';
  overlay.style.display = 'block';
  setStatus('床を検出中… カメラを床に向けてください');

  // ── Render Loop ──────────────────────────────────────────────────
  renderer.setAnimationLoop(renderLoop);
}

// ══════════════════════════════════════════════════════════════════════
//  Render Loop
// ══════════════════════════════════════════════════════════════════════
function renderLoop(timestamp, frame) {
  if (!frame) { renderer.render(scene, camera); return; }

  const session       = renderer.xr.getSession();
  const refSpace      = renderer.xr.getReferenceSpace();

  // Request hit-test source once
  if (!hitTestRequested) {
    hitTestRequested = true;
    session.requestReferenceSpace('viewer')
      .then(vs => session.requestHitTestSource({ space: vs }))
      .then(src => { hitTestSource = src; })
      .catch(e  => console.warn('[AR] hit-test source failed:', e));
  }

  // Process hit-test results
  if (hitTestSource) {
    const results = frame.getHitTestResults(hitTestSource);
    if (results.length > 0) {
      const pose = results[0].getPose(refSpace);
      if (pose) {
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);

        if (!cubeVisible) {
          setStatus('タップして配置');
        } else if (isDragging) {
          // Move cube to hit position
          const p = new THREE.Vector3();
          const q = new THREE.Quaternion();
          const s = new THREE.Vector3();
          reticle.matrix.decompose(p, q, s);
          cubeGroup.position.set(p.x, p.y + 0.25, p.z);
        }
      }
    } else {
      reticle.visible = false;
      if (!cubeVisible) setStatus('床を検出中… カメラを床に向けてください');
    }
  }

  // Subtle idle rotation when not dragging
  if (cubeVisible && !isDragging) {
    cubeGroup.children[0].rotation.y += 0.003;   // only the face mesh rotates gently
    // Edge lines and shadow disc are separate — don't rotate them here
  }

  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════════════════════════════
//  Cube helpers
// ══════════════════════════════════════════════════════════════════════
function placeCube() {
  const p = new THREE.Vector3();
  const q = new THREE.Quaternion();
  const s = new THREE.Vector3();
  reticle.matrix.decompose(p, q, s);

  // Bottom of cube sits exactly on the detected surface
  cubeGroup.position.set(p.x, p.y + 0.25, p.z);

  if (!cubeVisible) {
    cubeVisible = true;
    cubeGroup.visible = true;
    showCubeButtons(true);
  }
  setStatus('タップで移動 ｜ 長押しでドラッグ');
}

function rotateCube(dir) {
  cubeYRotation += dir * (Math.PI / 4);  // 45°
  cubeGroup.rotation.y = cubeYRotation;
}

function resetCube() {
  cubeVisible = false;
  cubeGroup.visible = false;
  cubeYRotation = 0;
  cubeGroup.rotation.y = 0;
  cubeGroup.children[0].rotation.y = 0;
  showCubeButtons(false);
  setStatus('床を検出中… カメラを床に向けてください');
}

// ══════════════════════════════════════════════════════════════════════
//  End AR Session
// ══════════════════════════════════════════════════════════════════════
async function endAR() {
  const session = renderer?.xr?.getSession?.();
  if (session) await session.end();
}

function onSessionEnd() {
  hitTestSource    = null;
  hitTestRequested = false;
  cubeVisible      = false;
  isDragging       = false;
  selectHeld       = false;
  clearTimeout(dragTimer);

  renderer.setAnimationLoop(null);
  if (renderer.domElement.parentNode) renderer.domElement.remove();
  renderer.dispose();

  document.getElementById('start-screen').style.display = 'flex';
  document.getElementById('overlay').style.display      = 'none';
  showCubeButtons(false);

  // Re-run checks so the start screen is ready again
  runCompatChecks();
}
</script>
</body>
</html>
