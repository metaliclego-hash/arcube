<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Cube 500mm</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Camera background */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Three.js canvas on top — transparent */
    #three-canvas {
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    /* UI layer above canvas */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    /* ── Start Screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(160deg, #0d1117, #161b22);
      color: #e6edf3;
    }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    #start-screen h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .subtitle {
      font-size: 0.9rem;
      color: #8b949e;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 1.8rem;
    }
    .info-box {
      width: 100%;
      max-width: 360px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      font-size: 0.82rem;
      color: #8b949e;
      line-height: 1.7;
    }
    .info-box b { color: #e6edf3; }
    #start-btn {
      width: 100%;
      max-width: 360px;
      background: #238636;
      color: #fff;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
    }
    #start-btn:active { background: #196127; }
    #err { margin-top: 1rem; font-size: 0.82rem; color: #f85149; text-align: center; }

    /* ── AR UI ── */
    #top-bar {
      position: absolute;
      top: env(safe-area-inset-top, 16px);
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      pointer-events: auto;
    }
    .badge {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #exit-btn {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    #bottom-panel {
      position: absolute;
      bottom: env(safe-area-inset-bottom, 28px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      width: 90%;
      max-width: 400px;
    }
    #status {
      background: rgba(0,0,0,0.60);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      padding: 10px 20px;
      border-radius: 22px;
      font-size: 0.88rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.10);
      width: 100%;
    }
    #btn-row { display: flex; gap: 10px; }
    .ar-btn {
      background: rgba(0,0,0,0.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 9px 18px;
      border-radius: 22px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .ar-btn:active { background: rgba(255,255,255,0.18); }
    .hidden { display: none !important; }

    /* Crosshair */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      pointer-events: none;
      opacity: 0.5;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #fff;
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { height: 2px; width: 100%; top: 50%;  transform: translateY(-50%); }
  </style>
</head>
<body>

<!-- Camera feed -->
<video id="bg-video" autoplay playsinline muted></video>

<!-- Three.js canvas -->
<canvas id="three-canvas"></canvas>

<!-- UI -->
<div id="ui" style="display:none">
  <div id="top-bar">
    <span class="badge">📦 500mm キューブ</span>
    <button id="exit-btn" onclick="stopAR()">✕ 終了</button>
  </div>
  <div id="crosshair"></div>
  <div id="bottom-panel">
    <div id="status">カメラを床に向けてタップで配置</div>
    <div id="btn-row">
      <button class="ar-btn hidden" id="btn-rl" onclick="rotateCube(-1)">← 回転</button>
      <button class="ar-btn hidden" id="btn-rr" onclick="rotateCube( 1)">回転 →</button>
      <button class="ar-btn hidden" id="btn-reset" onclick="resetCube()">リセット</button>
    </div>
  </div>
</div>

<!-- Start screen -->
<div id="start-screen">
  <div class="logo">📦</div>
  <h1>AR Cube 500mm</h1>
  <p class="subtitle">カメラ映像の上に 500mm の立方体を配置します。<br>床に向けてタップすると置けます。</p>
  <div class="info-box">
    <b>使い方</b><br>
    ① カメラを床に向ける<br>
    ② タップしてキューブを配置<br>
    ③ タップした場所へ移動<br>
    ④ ← → ボタンで回転
  </div>
  <button id="start-btn" onclick="startAR()">▶ AR を開始</button>
  <div id="err"></div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════════════
let renderer, scene, camera, animId;
let cubeGroup, floorGrid;
let cubeY = 0;
let cubeRotY = 0;
let cubeVisible = false;
let cameraStream = null;

// Touch / drag
let isDragging = false;
let lastTouch = null;
let touchStartPos = null;
let touchStartTime = 0;

// DeviceOrientation
let orientAlpha = 0, orientBeta = 90, orientGamma = 0;
let orientGranted = false;
let smoothQ = new THREE.Quaternion();

const TAP_MS   = 250;
const TAP_PX   = 12;

// ══════════════════════════════════════════════════════════════════
//  Start / Stop
// ══════════════════════════════════════════════════════════════════
async function startAR() {
  const errEl = document.getElementById('err');
  errEl.textContent = '';

  // 1. Camera
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' },
               width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
  } catch (e) {
    errEl.textContent = 'カメラの許可が必要です: ' + e.message;
    return;
  }
  const video = document.getElementById('bg-video');
  video.srcObject = cameraStream;

  // 2. Device orientation permission (iOS 13+)
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      orientGranted = (res === 'granted');
    } catch(_) {}
  } else {
    orientGranted = true;
  }
  if (orientGranted) {
    window.addEventListener('deviceorientation', onOrientation, true);
  }

  // 3. Three.js
  initThree();

  // 4. Touch events
  const canvas = document.getElementById('three-canvas');
  canvas.addEventListener('touchstart',  onTouchStart,  { passive: false });
  canvas.addEventListener('touchmove',   onTouchMove,   { passive: false });
  canvas.addEventListener('touchend',    onTouchEnd,    { passive: false });
  canvas.addEventListener('touchcancel', onTouchCancel, { passive: false });

  // 5. Show UI
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';

  // 6. Resize handler
  window.addEventListener('resize', onResize);

  setStatus('カメラを床に向けてタップで配置');
  animate();
}

function stopAR() {
  cancelAnimationFrame(animId);
  if (renderer) { renderer.dispose(); renderer = null; }
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  window.removeEventListener('deviceorientation', onOrientation, true);
  window.removeEventListener('resize', onResize);

  const canvas = document.getElementById('three-canvas');
  canvas.removeEventListener('touchstart',  onTouchStart);
  canvas.removeEventListener('touchmove',   onTouchMove);
  canvas.removeEventListener('touchend',    onTouchEnd);
  canvas.removeEventListener('touchcancel', onTouchCancel);

  document.getElementById('bg-video').srcObject = null;
  document.getElementById('ui').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';

  cubeVisible = false;
  showCubeButtons(false);
}

// ══════════════════════════════════════════════════════════════════
//  Three.js Init
// ══════════════════════════════════════════════════════════════════
function initThree() {
  scene = new THREE.Scene();

  const W = window.innerWidth, H = window.innerHeight;
  camera = new THREE.PerspectiveCamera(60, W / H, 0.01, 50);
  camera.position.set(0, 1.2, 0);    // eye height ~1.2 m
  camera.lookAt(0, 0, -1);

  const canvas = document.getElementById('three-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);  // fully transparent → shows video behind

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 1.4));
  const sun = new THREE.DirectionalLight(0xfff5e0, 2.0);
  sun.position.set(2, 5, 3);
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(0xb0d8ff, 0x4a3728, 0.5));

  // Floor grid (gives depth reference)
  const gridHelper = new THREE.GridHelper(8, 16, 0xffffff, 0xffffff);
  gridHelper.material.opacity    = 0.12;
  gridHelper.material.transparent = true;
  gridHelper.position.y = 0;
  scene.add(gridHelper);
  floorGrid = gridHelper;

  // Cube group
  cubeGroup = new THREE.Group();
  cubeGroup.visible = false;

  const SIZE = 0.5;
  const geo  = new THREE.BoxGeometry(SIZE, SIZE, SIZE);

  const faceMat = new THREE.MeshStandardMaterial({
    color: 0x1565C0,
    roughness: 0.35,
    metalness: 0.2,
    transparent: true,
    opacity: 0.88,
  });
  cubeGroup.add(new THREE.Mesh(geo, faceMat));

  const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff });
  cubeGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat));

  // Shadow disc
  const discGeo = new THREE.CircleGeometry(0.28, 32);
  discGeo.rotateX(-Math.PI / 2);
  const discMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.22 });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.y = -SIZE / 2 + 0.001;
  cubeGroup.add(disc);

  scene.add(cubeGroup);
}

// ══════════════════════════════════════════════════════════════════
//  Render Loop
// ══════════════════════════════════════════════════════════════════
function animate() {
  animId = requestAnimationFrame(animate);
  if (!renderer) return;

  applyCameraOrientation();
  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════════════════════════
//  Device Orientation → Camera Rotation
// ══════════════════════════════════════════════════════════════════
function onOrientation(e) {
  if (e.alpha != null) orientAlpha = e.alpha;
  if (e.beta  != null) orientBeta  = e.beta;
  if (e.gamma != null) orientGamma = e.gamma;
}

const _euler = new THREE.Euler();
const _quat  = new THREE.Quaternion();
// Correction: device-space → world-space for portrait mode
const _qBase = new THREE.Quaternion(-Math.SQRT1_2, 0, 0, Math.SQRT1_2);

function applyCameraOrientation() {
  if (!orientGranted) return;

  const screenAngle = (window.orientation || 0) * Math.PI / 180;

  _euler.set(
    THREE.MathUtils.degToRad(orientBeta),
    THREE.MathUtils.degToRad(orientAlpha),
    -THREE.MathUtils.degToRad(orientGamma),
    'YXZ'
  );
  _quat.setFromEuler(_euler);

  // Screen orientation correction
  const qScreen = new THREE.Quaternion(0, 0, -Math.sin(screenAngle / 2), Math.cos(screenAngle / 2));

  _quat.premultiply(_qBase).multiply(qScreen);

  // Smooth (SLERP)
  smoothQ.slerp(_quat, 0.15);
  camera.quaternion.copy(smoothQ);
}

// ══════════════════════════════════════════════════════════════════
//  Touch → Place / Move Cube
// ══════════════════════════════════════════════════════════════════
function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length !== 1) return;
  const t = e.touches[0];
  touchStartPos = { x: t.clientX, y: t.clientY };
  touchStartTime = Date.now();
  lastTouch = { x: t.clientX, y: t.clientY };
  isDragging = false;
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length !== 1 || !touchStartPos) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStartPos.x;
  const dy = t.clientY - touchStartPos.y;

  if (!isDragging && Math.sqrt(dx*dx + dy*dy) > TAP_PX) isDragging = true;

  if (isDragging && cubeVisible) {
    // Move cube: map screen delta to world XZ
    const delta = screenDeltaToWorld(
      t.clientX - lastTouch.x,
      t.clientY - lastTouch.y
    );
    cubeGroup.position.x += delta.x;
    cubeGroup.position.z += delta.z;
  }

  lastTouch = { x: t.clientX, y: t.clientY };
}

function onTouchEnd(e) {
  e.preventDefault();
  const elapsed = Date.now() - touchStartTime;

  if (!isDragging && elapsed < TAP_MS && touchStartPos) {
    // Tap → place / teleport cube
    placeCubeAtScreen(touchStartPos.x, touchStartPos.y);
  }
  isDragging = false;
  touchStartPos = null;
  lastTouch = null;
}

function onTouchCancel(e) {
  e.preventDefault();
  isDragging = false;
  touchStartPos = null;
  lastTouch = null;
}

// ══════════════════════════════════════════════════════════════════
//  Place cube at screen tap position (on floor plane y=0)
// ══════════════════════════════════════════════════════════════════
const _raycaster = new THREE.Raycaster();
const _floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const _ndcVec = new THREE.Vector2();
const _hitPt  = new THREE.Vector3();

function placeCubeAtScreen(screenX, screenY) {
  _ndcVec.set(
    (screenX / window.innerWidth)  * 2 - 1,
    -(screenY / window.innerHeight) * 2 + 1
  );
  _raycaster.setFromCamera(_ndcVec, camera);

  const floorY = 0;
  const planeAtFloor = new THREE.Plane(new THREE.Vector3(0, 1, 0), -floorY);
  if (_raycaster.ray.intersectPlane(planeAtFloor, _hitPt)) {
    cubeGroup.position.set(_hitPt.x, floorY + 0.25, _hitPt.z);
    if (!cubeVisible) {
      cubeVisible = true;
      cubeGroup.visible = true;
      showCubeButtons(true);
    }
    setStatus('ドラッグで移動 ｜ タップで再配置');
  }
}

// Convert screen pixel delta → world XZ delta on the floor plane
function screenDeltaToWorld(dsx, dsy) {
  // Use camera's right and forward vectors projected onto floor
  const right   = new THREE.Vector3();
  const forward = new THREE.Vector3();
  const up      = new THREE.Vector3(0, 1, 0);

  camera.getWorldDirection(forward);
  forward.y = 0;
  if (forward.length() < 0.001) return { x: 0, z: 0 };
  forward.normalize();
  right.crossVectors(forward, up).normalize();

  // Scale: rough metres-per-pixel based on distance from camera to cube
  const dist = camera.position.distanceTo(cubeGroup.position);
  const fovY = THREE.MathUtils.degToRad(camera.fov);
  const worldPerPx = (2 * dist * Math.tan(fovY / 2)) / window.innerHeight;

  return {
    x: (-right.x * dsx + forward.x * dsy) * worldPerPx,
    z: (-right.z * dsx + forward.z * dsy) * worldPerPx,
  };
}

// ══════════════════════════════════════════════════════════════════
//  Controls
// ══════════════════════════════════════════════════════════════════
function rotateCube(dir) {
  cubeRotY += dir * Math.PI / 4;
  cubeGroup.rotation.y = cubeRotY;
}

function resetCube() {
  cubeVisible = false;
  cubeGroup.visible = false;
  cubeGroup.position.set(0, 0.25, -1.5);
  cubeRotY = 0;
  cubeGroup.rotation.y = 0;
  showCubeButtons(false);
  setStatus('カメラを床に向けてタップで配置');
}

function showCubeButtons(show) {
  ['btn-rl','btn-rr','btn-reset'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', !show);
  });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ══════════════════════════════════════════════════════════════════
//  Resize
// ══════════════════════════════════════════════════════════════════
function onResize() {
  if (!renderer) return;
  const W = window.innerWidth, H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
}
</script>
</body>
</html>
