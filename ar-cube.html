<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Cube 500mm</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    #three-canvas { position: fixed; inset: 0; z-index: 10; }
    #ui { position: fixed; inset: 0; z-index: 20; pointer-events: none; display: none; }

    /* ── Start Screen ── */
    #start-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      background: linear-gradient(160deg, #0d1117, #161b22);
      color: #e6edf3;
    }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .subtitle { font-size: 0.9rem; color: #8b949e; text-align: center; line-height: 1.7; margin-bottom: 1.8rem; }
    .info-box {
      width: 100%; max-width: 360px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 14px; padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      font-size: 0.82rem; color: #8b949e; line-height: 1.8;
    }
    .info-box b { color: #e6edf3; }
    #start-btn {
      width: 100%; max-width: 360px;
      background: #238636; color: #fff;
      border: none; padding: 0.9rem;
      border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    #start-btn:disabled { background: #484f58; cursor: not-allowed; }
    #start-btn:not(:disabled):active { background: #196127; }
    #err {
      margin-top: 1rem; font-size: 0.82rem; color: #f85149;
      text-align: center; max-width: 360px; line-height: 1.5; white-space: pre-wrap;
    }

    /* ── AR UI ── */
    #top-bar {
      position: absolute; top: env(safe-area-inset-top, 16px);
      left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; pointer-events: auto;
    }
    .badge {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: #fff; padding: 7px 14px; border-radius: 20px; font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #exit-btn {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: #fff; border: 1px solid rgba(255,255,255,0.12);
      padding: 7px 16px; border-radius: 20px; font-size: 0.82rem; cursor: pointer;
    }
    #bottom-panel {
      position: absolute; bottom: env(safe-area-inset-bottom, 28px);
      left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: auto; width: 90%; max-width: 400px;
    }
    #status {
      background: rgba(0,0,0,0.60);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: #fff; padding: 10px 20px; border-radius: 22px; font-size: 0.88rem;
      text-align: center; border: 1px solid rgba(255,255,255,0.10); width: 100%;
    }
    #btn-row { display: flex; gap: 10px; }
    .ar-btn {
      background: rgba(0,0,0,0.58);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: #fff; border: 1px solid rgba(255,255,255,0.18);
      padding: 9px 18px; border-radius: 22px; font-size: 0.85rem; cursor: pointer;
    }
    .ar-btn:active { background: rgba(255,255,255,0.18); }
    .hidden { display: none !important; }

    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28px; height: 28px; pointer-events: none; opacity: 0.35;
    }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #fff; }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
  </style>
</head>
<body>

<video id="bg-video" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<div id="ui">
  <div id="top-bar">
    <span class="badge">📦 500mm キューブ</span>
    <button id="exit-btn" onclick="stopAR()">✕ 終了</button>
  </div>
  <div id="crosshair"></div>
  <div id="bottom-panel">
    <div id="status">タップしてキューブを配置</div>
    <div id="btn-row">
      <button class="ar-btn hidden" id="btn-rl"    onclick="rotateCube(-1)">← 回転</button>
      <button class="ar-btn hidden" id="btn-rr"    onclick="rotateCube( 1)">回転 →</button>
      <button class="ar-btn hidden" id="btn-reset" onclick="resetCube()">リセット</button>
    </div>
  </div>
</div>

<div id="start-screen">
  <div class="logo">📦</div>
  <h1>AR Cube 500mm</h1>
  <p class="subtitle">カメラ映像に 500mm の立方体を重ねて表示します。<br>WebXR 不要・Safari / Chrome 対応</p>
  <div class="info-box">
    <b>使い方</b><br>
    ① iPad を床に向けてタップ → キューブ配置<br>
    ② カメラを動かしても床に固定されたまま<br>
    ③ ドラッグで移動 ／ ← → で回転
  </div>
  <button id="start-btn" onclick="startAR()">読み込み中...</button>
  <div id="err"></div>
</div>

<script>
(function () {
  var btn = document.getElementById('start-btn');
  btn.disabled = true;
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js';
  s.onload  = function () { btn.disabled = false; btn.textContent = '▶ AR を開始'; };
  s.onerror = function () {
    document.getElementById('err').textContent = 'Three.js の読み込みに失敗しました。\nWi-Fi を確認して再読み込みしてください。';
    btn.textContent = '読み込み失敗';
  };
  document.head.appendChild(s);
})();
</script>

<script>
'use strict';

/* ─── アプリ状態 ─────────────────────────────────────────────── */
var renderer, scene, camera, animId;
var cubeGroup;
var cubeRotY    = 0;
var cubeVisible = false;
var cameraStream = null;

/* タッチ */
var isDragging     = false;
var lastTouch      = null;
var touchStartPos  = null;
var touchStartTime = 0;
var TAP_MS = 250;
var TAP_PX = 12;

/* ジャイロ（生の値） */
var orientGranted = false;
var orientAlpha   = 0;
var orientBeta    = 90;   // デバイスを立てて持った状態
var orientGamma   = 0;

/* Three.js ジャイロ用オブジェクト — initThree() 内で生成 */
var _smoothQ = null;   // カメラ四元数の平滑化バッファ
var _euler   = null;
var _qTmp    = null;
var _q1      = null;   // -90° around X: カメラがデバイス背面を向く補正
var _zee     = null;
var _qZee    = null;
var _orientInitialized = false;

/* ─── ユーティリティ ────────────────────────────────────────── */
function showErr(msg) {
  document.getElementById('err').textContent = msg;
  var btn = document.getElementById('start-btn');
  btn.disabled = false;
  btn.textContent = '▶ もう一度試す';
}
function setStatus(msg) {
  var el = document.getElementById('status');
  if (el) el.textContent = msg;
}
function showCubeButtons(show) {
  ['btn-rl','btn-rr','btn-reset'].forEach(function(id) {
    document.getElementById(id).classList.toggle('hidden', !show);
  });
}

/* ─── startAR ───────────────────────────────────────────────── */
async function startAR() {
  var btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.textContent = '起動中...';
  document.getElementById('err').textContent = '';

  if (typeof THREE === 'undefined') {
    showErr('Three.js がまだ読み込まれていません。\nしばらく待ってもう一度タップしてください。');
    return;
  }

  /* ① DeviceOrientation 許可（iOS: ユーザー操作の直後に呼ぶ必要がある） */
  orientGranted = false;
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      var res = await DeviceOrientationEvent.requestPermission();
      orientGranted = (res === 'granted');
    } catch (_) {}
  } else {
    /* Android / デスクトップ Chrome はパーミッション不要 */
    orientGranted = true;
  }

  /* ② カメラ */
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showErr('カメラ API が使えません。\nHTTPS で開いているか確認してください。');
    return;
  }
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });
  } catch (e) {
    showErr('カメラエラー: ' + e.name + '\n' + e.message);
    return;
  }
  var video = document.getElementById('bg-video');
  video.srcObject = cameraStream;
  try { await video.play(); } catch (_) {}

  /* ③ ジャイロ登録 */
  if (orientGranted) {
    window.addEventListener('deviceorientation', onOrientation, true);
  }

  /* ④ Three.js 初期化 */
  try { initThree(); } catch (e) {
    showErr('3D 初期化エラー: ' + e.message);
    return;
  }

  /* ⑤ タッチ */
  var canvas = document.getElementById('three-canvas');
  canvas.addEventListener('touchstart',  onTouchStart,  { passive: false });
  canvas.addEventListener('touchmove',   onTouchMove,   { passive: false });
  canvas.addEventListener('touchend',    onTouchEnd,    { passive: false });
  canvas.addEventListener('touchcancel', onTouchCancel, { passive: false });
  window.addEventListener('resize', onResize);

  /* ⑥ 表示切替 */
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  setStatus('床に向けてタップでキューブを配置');
  animate();
}

/* ─── stopAR ────────────────────────────────────────────────── */
function stopAR() {
  cancelAnimationFrame(animId);
  if (renderer) { renderer.dispose(); renderer = null; }
  if (cameraStream) {
    cameraStream.getTracks().forEach(function(t) { t.stop(); });
    cameraStream = null;
  }
  document.getElementById('bg-video').srcObject = null;
  window.removeEventListener('deviceorientation', onOrientation, true);
  window.removeEventListener('resize', onResize);
  var canvas = document.getElementById('three-canvas');
  canvas.removeEventListener('touchstart',  onTouchStart);
  canvas.removeEventListener('touchmove',   onTouchMove);
  canvas.removeEventListener('touchend',    onTouchEnd);
  canvas.removeEventListener('touchcancel', onTouchCancel);
  cubeVisible = false; cubeRotY = 0;
  _smoothQ = _euler = _qTmp = _q1 = _zee = _qZee = null;
  _orientInitialized = false;
  showCubeButtons(false);
  document.getElementById('ui').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  var btn = document.getElementById('start-btn');
  btn.disabled = false; btn.textContent = '▶ AR を開始';
}

/* ─── initThree ─────────────────────────────────────────────── */
function initThree() {
  scene  = new THREE.Scene();
  var W  = window.innerWidth, H = window.innerHeight;

  camera = new THREE.PerspectiveCamera(60, W / H, 0.01, 50);
  camera.position.set(0, 1.3, 0);
  /* 初期向き: 少し前下方向（ジャイロが来るまでの仮の向き） */
  camera.lookAt(0, 0, -1.5);

  var canvas = document.getElementById('three-canvas');
  renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);

  /* 照明 */
  scene.add(new THREE.AmbientLight(0xffffff, 1.4));
  var sun = new THREE.DirectionalLight(0xfff5e0, 2.0);
  sun.position.set(2, 5, 3); scene.add(sun);
  scene.add(new THREE.HemisphereLight(0xb0d8ff, 0x4a3728, 0.5));

  /* 床グリッド */
  var grid = new THREE.GridHelper(10, 20, 0xffffff, 0xffffff);
  grid.material.opacity = 0.12; grid.material.transparent = true;
  scene.add(grid);

  /* キューブ 500mm */
  cubeGroup = new THREE.Group();
  cubeGroup.visible = false;
  scene.add(cubeGroup);
  var SIZE = 0.5;
  var geo  = new THREE.BoxGeometry(SIZE, SIZE, SIZE);
  cubeGroup.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    color: 0x1565C0, roughness: 0.35, metalness: 0.2, transparent: true, opacity: 0.90
  })));
  cubeGroup.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0xffffff })
  ));
  var discGeo = new THREE.CircleGeometry(0.28, 32);
  discGeo.rotateX(-Math.PI / 2);
  var disc = new THREE.Mesh(discGeo,
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.22 }));
  disc.position.y = -SIZE / 2 + 0.001;
  cubeGroup.add(disc);

  /* ジャイロ用 Three.js オブジェクトを生成（ここで初めて THREE.* を使う） */
  _smoothQ = camera.quaternion.clone(); // 初期値をカメラの向きに合わせる
  _euler   = new THREE.Euler();
  _qTmp    = new THREE.Quaternion();
  _q1      = new THREE.Quaternion(-Math.SQRT1_2, 0, 0, Math.SQRT1_2); // -90° around X
  _zee     = new THREE.Vector3(0, 0, 1);
  _qZee    = new THREE.Quaternion();
}

/* ─── DeviceOrientation ─────────────────────────────────────── */
function onOrientation(e) {
  if (e.alpha != null) orientAlpha = e.alpha;
  if (e.beta  != null) orientBeta  = e.beta;
  if (e.gamma != null) orientGamma = e.gamma;
}

/*
 * Three.js DeviceOrientationControls の正しい公式:
 *   euler  = (beta, alpha, -gamma) in YXZ
 *   quat   = fromEuler(euler)
 *   quat  *= q1          ← カメラがデバイス天面でなく背面を向く補正
 *   quat  *= qZee        ← 画面の向き（縦横）補正
 *
 * 前回の実装は premultiply（左側から掛ける）になっていたため不正確だった。
 * 正しくは右側から multiply する。
 */
function applyCameraOrientation() {
  if (!orientGranted || !_smoothQ || !camera) return;

  var screenOrient = ((window.orientation || 0) * Math.PI) / 180;

  _euler.set(
    THREE.MathUtils.degToRad(orientBeta),
    THREE.MathUtils.degToRad(orientAlpha),
    -THREE.MathUtils.degToRad(orientGamma),
    'YXZ'
  );
  _qTmp.setFromEuler(_euler);
  _qTmp.multiply(_q1);                                        // 右から掛ける
  _qTmp.multiply(_qZee.setFromAxisAngle(_zee, -screenOrient)); // 右から掛ける

  if (!_orientInitialized) {
    /* 最初のフレームはスナップ（ワープ防止） */
    _smoothQ.copy(_qTmp);
    _orientInitialized = true;
  } else {
    _smoothQ.slerp(_qTmp, 0.15); /* SLERP で微小ジッター除去 */
  }
  camera.quaternion.copy(_smoothQ);
}

/* ─── レンダーループ ─────────────────────────────────────────── */
function animate() {
  animId = requestAnimationFrame(animate);
  if (!renderer) return;
  applyCameraOrientation();
  renderer.render(scene, camera);
}

/* ─── タッチ ─────────────────────────────────────────────────── */
function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length !== 1) return;
  var t = e.touches[0];
  touchStartPos  = { x: t.clientX, y: t.clientY };
  touchStartTime = Date.now();
  lastTouch      = { x: t.clientX, y: t.clientY };
  isDragging     = false;
}
function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length !== 1 || !touchStartPos) return;
  var t  = e.touches[0];
  var dx = t.clientX - touchStartPos.x;
  var dy = t.clientY - touchStartPos.y;
  if (!isDragging && Math.sqrt(dx*dx + dy*dy) > TAP_PX) isDragging = true;
  if (isDragging && cubeVisible) {
    var d = screenDeltaToWorld(t.clientX - lastTouch.x, t.clientY - lastTouch.y);
    cubeGroup.position.x += d.x;
    cubeGroup.position.z += d.z;
  }
  lastTouch = { x: t.clientX, y: t.clientY };
}
function onTouchEnd(e) {
  e.preventDefault();
  if (!isDragging && (Date.now() - touchStartTime) < TAP_MS && touchStartPos) {
    placeCubeAtScreen(touchStartPos.x, touchStartPos.y);
  }
  isDragging = false; touchStartPos = null; lastTouch = null;
}
function onTouchCancel(e) {
  e.preventDefault();
  isDragging = false; touchStartPos = null; lastTouch = null;
}

/* ─── タップ位置 → 床 (y=0) にキューブを置く ─────────────────── */
function placeCubeAtScreen(sx, sy) {
  if (!camera || !cubeGroup) return;
  var raycaster = new THREE.Raycaster();
  var ndc = new THREE.Vector2(
    (sx / window.innerWidth)  *  2 - 1,
    (sy / window.innerHeight) * -2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  var hit = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0), 0), hit)) {
    cubeGroup.position.set(hit.x, 0.25, hit.z);
    if (!cubeVisible) {
      cubeVisible = true;
      cubeGroup.visible = true;
      showCubeButtons(true);
    }
    setStatus('ドラッグで移動 ｜ タップで再配置');
  }
}

/* ─── ドラッグ量 → ワールド XZ 移動 ─────────────────────────── */
function screenDeltaToWorld(dsx, dsy) {
  if (!camera || !cubeGroup) return { x: 0, z: 0 };
  var forward = new THREE.Vector3();
  var right   = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  if (forward.length() < 0.001) return { x: 0, z: 0 };
  forward.normalize();
  right.crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();
  var dist  = camera.position.distanceTo(cubeGroup.position);
  var scale = (2 * dist * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2)) / window.innerHeight;
  return {
    x: (-right.x * dsx + forward.x * dsy) * scale,
    z: (-right.z * dsx + forward.z * dsy) * scale
  };
}

/* ─── ボタン ─────────────────────────────────────────────────── */
function rotateCube(dir) {
  cubeRotY += dir * (Math.PI / 4);
  cubeGroup.rotation.y = cubeRotY;
}
function resetCube() {
  cubeVisible = false; cubeGroup.visible = false;
  cubeRotY = 0; cubeGroup.rotation.y = 0;
  showCubeButtons(false);
  setStatus('床に向けてタップでキューブを配置');
}
function onResize() {
  if (!renderer || !camera) return;
  var W = window.innerWidth, H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
}
</script>
</body>
</html>
